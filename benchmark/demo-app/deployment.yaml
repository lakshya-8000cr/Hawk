apiVersion: v1
kind: ConfigMap
metadata:
  name: hawk-benchmark-config
data:
  APP_MODE: benchmark
---
apiVersion: v1
kind: Secret
metadata:
  name: hawk-benchmark-secret
type: Opaque
stringData:
  API_KEY: hawk-test-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawk-benchmark
  labels:
    app: hawk-benchmark
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hawk-benchmark
  template:
    metadata:
      labels:
        app: hawk-benchmark
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0
          args:
            - "-text=hawk benchmark endpoint"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: hawk-benchmark-config
                  key: APP_MODE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hawk-benchmark-secret
                  key: API_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hawk-benchmark
spec:
  type: NodePort
  selector:
    app: hawk-benchmark
  ports:
    - name: http
      port: 80
      targetPort: 5678