  name: hawk-app-080
  namespace: hawk-extreme
  labels:
    app: hawk-app-080
    benchmark.hawk/scale: extreme
spec:
  replicas: 10
  selector:
    matchLabels:
      app: hawk-app-080
  template:
    metadata:
      labels:
        app: hawk-app-080
        benchmark.hawk/scale: extreme
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: hawk-app-080-config
                  key: APP_MODE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hawk-app-080-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 1m
              memory: 2Mi
            limits:
              cpu: 5m
              memory: 8Mi
          volumeMounts:
            - name: application-data
              mountPath: /benchmark-data
      volumes:
        - name: config-volume
          configMap:
            name: hawk-app-080-config
        - name: secret-volume
          secret:
            secretName: hawk-app-080-secret
        - name: application-data
          persistentVolumeClaim:
            claimName: hawk-app-080-data
---
apiVersion: v1
kind: Service
metadata:
  name: hawk-app-080
  namespace: hawk-extreme
  labels:
    app: hawk-app-080
spec:
  selector:
    app: hawk-app-080
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
