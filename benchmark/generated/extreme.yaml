metadata:
  name: hawk-app-185
  namespace: hawk-extreme
  labels:
    app: hawk-app-185
spec:
  selector:
    app: hawk-app-185
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hawk-app-186-config
  namespace: hawk-extreme
  labels:
    app: hawk-app-186
data:
  APP_MODE: extreme-benchmark
  APP_ID: "186"
---
apiVersion: v1
kind: Secret
metadata:
  name: hawk-app-186-secret
  namespace: hawk-extreme
  labels:
    app: hawk-app-186
type: Opaque
stringData:
  API_KEY: benchmark-key-186
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawk-app-186
  namespace: hawk-extreme
  labels:
    app: hawk-app-186
    benchmark.hawk/scale: extreme
spec:
  replicas: 10
  selector:
    matchLabels:
      app: hawk-app-186
  template:
    metadata:
      labels:
        app: hawk-app-186
        benchmark.hawk/scale: extreme
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: hawk-app-186-config
                  key: APP_MODE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hawk-app-186-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 1m
              memory: 2Mi
            limits:
              cpu: 5m
              memory: 8Mi
      volumes:
        - name: config-volume
          configMap:
            name: hawk-app-186-config
        - name: secret-volume
          secret:
            secretName: hawk-app-186-secret
---
