apiVersion: v1
kind: Namespace
metadata:
  name: hawk-extreme
  labels:
    app.kubernetes.io/part-of: hawk-extreme-benchmark
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hawk-app-001-config
  namespace: hawk-extreme
  labels:
    app: hawk-app-001
data:
  APP_MODE: extreme-benchmark
  APP_ID: "001"
---
apiVersion: v1
kind: Secret
metadata:
  name: hawk-app-001-secret
  namespace: hawk-extreme
  labels:
    app: hawk-app-001
type: Opaque
stringData:
  API_KEY: benchmark-key-001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hawk-app-001-data
  namespace: hawk-extreme
  labels:
    app: hawk-app-001
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hawk-benchmark-nonexistent
  resources:
    requests:
      storage: 1Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawk-app-001
  namespace: hawk-extreme
  labels:
    app: hawk-app-001
    benchmark.hawk/scale: extreme
spec:
  replicas: 10
  selector:
    matchLabels:
      app: hawk-app-001
  template:
    metadata:
      labels:
        app: hawk-app-001
        benchmark.hawk/scale: extreme
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: hawk-app-001-config
                  key: APP_MODE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hawk-app-001-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 1m
              memory: 2Mi
            limits:
              cpu: 5m
              memory: 8Mi
          volumeMounts:
            - name: application-data
              mountPath: /benchmark-data
      volumes:
        - name: config-volume
          configMap:
            name: hawk-app-001-config
        - name: secret-volume
          secret:
            secretName: hawk-app-001-secret
        - name: application-data
          persistentVolumeClaim:
            claimName: hawk-app-001-data
---
apiVersion: v1
kind: Service
metadata:
  name: hawk-app-001
  namespace: hawk-extreme
  labels:
    app: hawk-app-001
spec:
  selector:
    app: hawk-app-001
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hawk-app-001
  namespace: hawk-extreme
  labels:
    app: hawk-app-001
spec:
  rules:
    - host: hawk-app-001.benchmark.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hawk-app-001
                port:
                  number: 80
