kind: Deployment
metadata:
  name: hawk-app-034
  namespace: hawk-extreme
  labels:
    app: hawk-app-034
    benchmark.hawk/scale: extreme
spec:
  replicas: 10
  selector:
    matchLabels:
      app: hawk-app-034
  template:
    metadata:
      labels:
        app: hawk-app-034
        benchmark.hawk/scale: extreme
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: hawk-app-034-config
                  key: APP_MODE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hawk-app-034-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 1m
              memory: 2Mi
            limits:
              cpu: 5m
              memory: 8Mi
          volumeMounts:
            - name: application-data
              mountPath: /benchmark-data
      volumes:
        - name: config-volume
          configMap:
            name: hawk-app-034-config
        - name: secret-volume
          secret:
            secretName: hawk-app-034-secret
        - name: application-data
          persistentVolumeClaim:
            claimName: hawk-app-034-data
---
apiVersion: v1
kind: Service
metadata:
  name: hawk-app-034
  namespace: hawk-extreme
  labels:
    app: hawk-app-034
spec:
  selector:
    app: hawk-app-034
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hawk-app-034
  namespace: hawk-extreme
  labels:
    app: hawk-app-034
spec:
  rules:
    - host: hawk-app-034.benchmark.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hawk-app-034
                port:
                  number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hawk-app-035-config
  namespace: hawk-extreme
  labels:
    app: hawk-app-035
data:
  APP_MODE: extreme-benchmark
  APP_ID: "035"
---
apiVersion: v1
kind: Secret
metadata:
  name: hawk-app-035-secret
  namespace: hawk-extreme
  labels:
    app: hawk-app-035
type: Opaque
stringData:
  API_KEY: benchmark-key-035
---
apiVersion: v1
