---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawk-app-112
  namespace: hawk-extreme
  labels:
    app: hawk-app-112
    benchmark.hawk/scale: extreme
spec:
  replicas: 10
  selector:
    matchLabels:
      app: hawk-app-112
  template:
    metadata:
      labels:
        app: hawk-app-112
        benchmark.hawk/scale: extreme
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: hawk-app-112-config
                  key: APP_MODE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hawk-app-112-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 1m
              memory: 2Mi
            limits:
              cpu: 5m
              memory: 8Mi
      volumes:
        - name: config-volume
          configMap:
            name: hawk-app-112-config
        - name: secret-volume
          secret:
            secretName: hawk-app-112-secret
