  namespace: hawk-extreme
  labels:
    app: hawk-app-198
type: Opaque
stringData:
  API_KEY: benchmark-key-198
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawk-app-198
  namespace: hawk-extreme
  labels:
    app: hawk-app-198
    benchmark.hawk/scale: extreme
spec:
  replicas: 10
  selector:
    matchLabels:
      app: hawk-app-198
  template:
    metadata:
      labels:
        app: hawk-app-198
        benchmark.hawk/scale: extreme
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: hawk-app-198-config
                  key: APP_MODE
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: hawk-app-198-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 1m
              memory: 2Mi
            limits:
              cpu: 5m
              memory: 8Mi
      volumes:
        - name: config-volume
          configMap:
            name: hawk-app-198-config
        - name: secret-volume
          secret:
            secretName: hawk-app-198-secret
---
apiVersion: v1
kind: Service
metadata:
  name: hawk-app-198
  namespace: hawk-extreme
  labels:
    app: hawk-app-198
spec:
  selector:
    app: hawk-app-198
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
